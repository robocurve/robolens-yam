name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint + strict typing, once. mypy targets the 3.10 floor via pyproject; running
  # it on 3.11 avoids NumPy's 3.12-only stub syntax.
  quality:
    name: lint · type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Create venv
        run: uv venv --python 3.11
      - name: Install (dev extras; roboinspect + kitchenbench from git tags)
        run: uv pip install -e ".[dev]"
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Ruff (format check)
        run: uv run ruff format --check .
      - name: Mypy (strict)
        run: uv run mypy

  # Blocking test gate across the supported OS x Python matrix (100% coverage).
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Create venv (py${{ matrix.python-version }})
        run: uv venv --python ${{ matrix.python-version }}
      - name: Install (dev extras)
        run: uv pip install -e ".[dev]"
      - name: Pytest (100% coverage)
        run: uv run pytest --cov --cov-report=term-missing

  # Dependency hygiene: the package must import with ONLY its runtime deps
  # (roboinspect + numpy) — no requests, json_numpy, or i2rt (those are lazy extras).
  import-hygiene:
    name: import without client/hardware extras
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Create venv
        run: uv venv --python 3.12
      - name: Install runtime only (no extras)
        run: uv pip install -e .
      - name: Assert optional deps absent, then import
        run: |
          uv run python - <<'PY'
          import importlib.util
          for mod in ("requests", "json_numpy", "i2rt"):
              assert importlib.util.find_spec(mod) is None, f"{mod} unexpectedly installed"
          import robolens_yam
          print("robolens_yam", robolens_yam.__version__, "imported with runtime deps only")
          PY
